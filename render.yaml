services:
  - type: web
    name: bartender-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BT_SUPABASE_URL
        sync: false
      - key: BT_SUPABASE_SERVICE_KEY
        sync: false
      - key: BT_APP_ORIGIN
        sync: false
